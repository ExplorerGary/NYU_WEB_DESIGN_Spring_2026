<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Site</title>
     <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="wrap">
        <header>
            <h1>Welcome to my Personal Site : Contact Me</h1>
        </header>
       <nav>
            <ul>
                <a href="index.html">
                    <li>
                        Home
                    </li>
                </a>
                <a href="about.html">
                    <li>
                        About
                    </li>
                </a>
                <a href="contact.html">
                    <li>
                    
                        Contact
                    </li>
                </a>
            </ul>
        </nav>
        <main>
            <h3>Contact Me</h3>
            <form method="POST" action="thanks.html">
                <table width="600px" border="1">
                    <tr>
                        <td colspan="2">
                            <h2>Please use this form to message me</h2>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Name:
                        </td>
                        <td>
                            <input type="text" name="username"/>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Section
                        </td>
                        <td>
                            <input type="radio" name="section" value="AM"/> AM
                            <input type="radio" name="section" value="PM"/> PM
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Message:
                        </td>
                        <td>
                            <textarea name="message" cols="20" rows="10"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="reset" value="Clear"/>
                            <input type="submit" value="Send"/>
                        </td>
                    </tr>
                </table>
            </form>
        </main>
         <footer>
            <section id="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12093.926355756304!2d-74.00749946633405!3d40.72942744415872!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2599051b30887%3A0x6028dd2df0a0e9a2!2sElmer%20Holmes%20Bobst%20Library!5e0!3m2!1sen!2sus!4v1770239062705!5m2!1sen!2sus" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </section>
            <section id="socialMedia">
                <a href="https://www.instagram.com" target="_blank">
                    <img src="images/instagram.svg"/>
                </a>
                <a href="https://www.youtube.com" target="_blank">
                    <img src="images/youtube.svg"/>
                </a>
                <a href="https://www.linkedin.com" target="_blank">
                    <img src="images/linkedin.svg"/>
                </a>
                <a href="https://www.tiktok.com" target="_blank">
                    <img src="images/tiktok.svg"/>
                </a>
            </section>
        </footer>
    </div>    

</body>
</html>
