<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Demo</title>
</head>
<body>

    <table width="600px" border="1">
        <tr>
            <td>1</td>
        </tr>
    </table>

    <br/><br/>

    <table width="600px" border="1">
        <tr>
            <td>1</td>
            <td>2</td>
        </tr>
    </table>

    <br/><br/>

    <table width="600px" border="1">
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
    </table>

    <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td>1</td>
        </tr>
        <tr>
            <td>2</td>
        </tr>
    </table>

    <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td>1</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>
    </table>

    <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
    </table>
    

    <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td>1</td>
            <td>2</td>
        </tr>
        <tr>
            <td colspan="2">3</td>
        </tr>
    </table>
    
     <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td colspan="3">3</td>
        </tr>
    </table>

     <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td rowspan="2">1</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
        </tr>
    </table>
    
    <!-- Nested Tables -->
    <br/><br/>
    <table width="600px" border="1">
        <tr>
            <td width="50%">1</td>
            <td rowspan="2">
                <table width="100%" border="1">
                    <tr>
                        <td>a</td>
                        <td>b</td>
                    </tr>
                    <tr>
                        <td>c</td>
                        <td>d</td>
                    </tr>
                </table>

            </td>
        </tr>
        <tr>
            <td>3</td>
        </tr>
    </table>


    
</body>
</html>
