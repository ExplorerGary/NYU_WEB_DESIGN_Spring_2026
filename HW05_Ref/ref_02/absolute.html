<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box, 
        .absolute-box{
            width : 200px;
            height : 200px;
            border : solid 1px black;
            background : grey;
        }

        .absolute-box{
            background : green;
            position : absolute;
            bottom : 100px;
            right : 0px;
            z-index : -1;
        }
    </style>
</head>
<body>
    
    <div class="absolute-box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</body>
</html>
